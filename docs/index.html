<!-- File: docs/index.html -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ticket Radar</title>
    <meta name="description" content="نسخة static من Ticket Radar تعمل على GitHub Pages" />
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #f5f7fb;
            color: #212529;
        }

        .container {
            width: min(100% - 24px, 900px);
            margin: 40px auto;
        }

        .hero-card,
        .control-card,
        .status-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: #ffffff;
        }

        .hero-card {
            background: linear-gradient(135deg, #0d6efd, #198754);
            color: #fff;
            padding: 28px;
            text-align: center;
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hero-subtitle {
            font-size: 1.05rem;
            margin-bottom: 0;
            opacity: 0.95;
        }

        .card {
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-title-custom {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .team-select {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            font-size: 1rem;
            border: 1px solid #ced4da;
            padding: 0 14px;
            background: #fff;
        }

        .action-btn,
        .sound-btn,
        .booking-btn {
            min-height: 48px;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            padding: 12px 20px;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-success {
            background: #198754;
            color: #fff;
        }

        .btn-outline-danger {
            background: #fff;
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .btn-primary {
            background: #0d6efd;
            color: #fff;
        }

        .btn-warning {
            background: #ffc107;
            color: #212529;
        }

        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }

        .status-box {
            font-size: 1.25rem;
            line-height: 2;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 18px;
            padding: 20px;
            min-height: 110px;
            word-break: break-word;
            text-align: center;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 20px;
        }

        .meta-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid #eef1f4;
        }

        .meta-label {
            display: block;
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .meta-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #212529;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .status-live {
            color: #198754;
            font-weight: 700;
        }

        .status-idle {
            color: #dc3545;
            font-weight: 700;
        }

        .mb-3 {
            margin-bottom: 1rem;
        }

        .text-center {
            text-align: center;
        }

        .note {
            margin-top: 14px;
            font-size: 0.95rem;
            color: #6c757d;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 1.8rem;
            }

            .status-box {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-card">
            <div class="hero-title">🎫 Ticket Radar</div>
            <p class="hero-subtitle">مراقبة تذاكر تذكرتي بشكل مباشر وتنبيه عند توفر الحجز</p>
        </div>

        <div class="card control-card text-center">
            <div class="card-title-custom">اختيار النادي</div>

            <div class="mb-3">
                <select id="teamName" class="team-select text-center">
                    <option value="">-- اختر النادي --</option>
                    <option value="النادي الأهلى">النادي الأهلى</option>
                    <option value="نادى الزمالك">نادى الزمالك</option>
                </select>
            </div>

            <div class="controls-row">
                <button type="button" id="startButton" class="action-btn btn-success">
                    تشغيل الرادار
                </button>

                <button type="button" id="stopButton" class="action-btn btn-outline-danger">
                    إيقاف الرادار
                </button>
            </div>

            <div class="note">
                هذه نسخة static تعمل على GitHub Pages وقد يتعذر جلب البيانات مباشرة إذا كان الموقع يمنع CORS.
            </div>
        </div>

        <div class="card status-card text-center">
            <div class="card-title-custom">الحالة الحالية</div>

            <div id="statusBox" class="status-box">
                اختر النادي واضغط تشغيل الرادار
            </div>

            <div class="controls-row">
                <a id="bookingButton" href="https://www.tazkarti.com/#/matches" target="_blank" rel="noreferrer" class="booking-btn btn-primary">
                    فتح صفحة المباريات
                </a>

                <button type="button" id="soundToggleButton" class="sound-btn btn-warning">
                    🔊 الصوت مفعل
                </button>
            </div>

            <div class="meta-grid">
                <div class="meta-item">
                    <span class="meta-label">النادي المختار</span>
                    <span id="selectedTeamText" class="meta-value">-</span>
                </div>

                <div class="meta-item">
                    <span class="meta-label">آخر فحص</span>
                    <span id="lastCheckTime" class="meta-value">-</span>
                </div>

                <div class="meta-item">
                    <span class="meta-label">حالة التنبيه</span>
                    <span id="soundStatusText" class="meta-value status-live">مفعل</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="alarmSound" preload="auto">
        <source src="./sounds/alarm.mp3" type="audio/mpeg" />
    </audio>

    <script>
        const MATCHES_URL = "https://www.tazkarti.com/data/matches-list-json.json";
        const BOOKING_URL = "https://www.tazkarti.com/#/matches";
        const DEFAULT_STATUS = "اختر النادي واضغط تشغيل الرادار";
        const POLL_INTERVAL_MS = 5000;

        let selectedTeam = localStorage.getItem("ticketRadar.selectedTeam") || "";
        let lastPlayedStatus = "";
        let isSoundEnabled = localStorage.getItem("ticketRadar.soundEnabled") !== "false";
        let radarTimerId = null;

        function updateSoundButton() {
            const soundToggleButton = document.getElementById("soundToggleButton");
            const soundStatusText = document.getElementById("soundStatusText");

            if (isSoundEnabled) {
                soundToggleButton.className = "sound-btn btn-warning";
                soundToggleButton.textContent = "🔊 الصوت مفعل";
                soundStatusText.textContent = "مفعل";
                soundStatusText.className = "meta-value status-live";
                return;
            }

            soundToggleButton.className = "sound-btn btn-secondary";
            soundToggleButton.textContent = "🔇 الصوت متوقف";
            soundStatusText.textContent = "متوقف";
            soundStatusText.className = "meta-value status-idle";
        }

        function updateMeta() {
            document.getElementById("selectedTeamText").textContent = selectedTeam || "-";
            document.getElementById("lastCheckTime").textContent = new Date().toLocaleString("ar-EG");
        }

        function renderStatus(status, bookingUrl = BOOKING_URL) {
            document.getElementById("statusBox").innerHTML = status || "لا توجد بيانات";
            document.getElementById("bookingButton").href = bookingUrl || BOOKING_URL;
            updateMeta();
        }

        function normalizeArabic(value) {
            return String(value || "")
                .trim()
                .replace(/[أإآ]/g, "ا")
                .replace(/ى/g, "ي")
                .replace(/ة/g, "ه")
                .replace(/ـ/g, "")
                .toLowerCase();
        }

        function containsText(source, team) {
            return normalizeArabic(source).includes(normalizeArabic(team));
        }

        function getSafeValue(preferred, fallback) {
            if (preferred && String(preferred).trim()) {
                return preferred;
            }

            if (fallback && String(fallback).trim()) {
                return fallback;
            }

            return "غير محدد";
        }

        function formatKickoffTime(value) {
            if (!value) {
                return "الوقت غير محدد";
            }

            const date = new Date(value);
            if (Number.isNaN(date.getTime())) {
                return "الوقت غير محدد";
            }

            return date.toLocaleString("ar-EG", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        async function fetchMatches() {
            const url = `${MATCHES_URL}?_=${Date.now()}`;
            const response = await fetch(url, {
                method: "GET",
                cache: "no-store"
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            return response.json();
        }

        function findAvailableMatches(matches, team) {
            return (Array.isArray(matches) ? matches : [])
                .filter((x) => {
                    return x.matchStatus === 1 &&
                        x.matchHasBookedTickets === true &&
                        (
                            containsText(x.teamNameAr1, team) ||
                            containsText(x.teamNameAr2, team) ||
                            containsText(x.teamName1, team) ||
                            containsText(x.teamName2, team)
                        );
                })
                .sort((a, b) => {
                    const aTime = a.kickOffTime ? new Date(a.kickOffTime).getTime() : Number.MAX_SAFE_INTEGER;
                    const bTime = b.kickOffTime ? new Date(b.kickOffTime).getTime() : Number.MAX_SAFE_INTEGER;
                    return aTime - bTime;
                });
        }

        function buildStatusHtml(matches) {
            if (!matches.length) {
                return `لا توجد تذاكر متاحة حالياً لـ: ${escapeHtml(selectedTeam)}`;
            }

            return matches.map((match) => {
                const team1 = getSafeValue(match.teamNameAr1, match.teamName1);
                const team2 = getSafeValue(match.teamNameAr2, match.teamName2);
                const stadium = getSafeValue(match.stadiumNameAr, "غير محدد");
                const kickoff = formatKickoffTime(match.kickOffTime);

                return `🔥 ${escapeHtml(team1)} ضد ${escapeHtml(team2)} - ${escapeHtml(stadium)} - ${escapeHtml(kickoff)}`;
            }).join("<br>");
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        async function refreshStatus() {
            if (!selectedTeam) {
                renderStatus(DEFAULT_STATUS);
                return;
            }

            try {
                const matches = await fetchMatches();
                const availableMatches = findAvailableMatches(matches, selectedTeam);
                const statusHtml = buildStatusHtml(availableMatches);

                renderStatus(statusHtml, BOOKING_URL);

                const hasTickets = availableMatches.length > 0;
                if (hasTickets && isSoundEnabled && statusHtml !== lastPlayedStatus) {
                    const audio = document.getElementById("alarmSound");
                    audio.play().catch(() => {
                        console.log("المتصفح منع تشغيل الصوت قبل التفاعل");
                    });
                    lastPlayedStatus = statusHtml;
                }

                if (!hasTickets) {
                    lastPlayedStatus = "";
                }
            } catch (error) {
                console.error("فشل تحديث الحالة", error);
                renderStatus(
                    "تعذر قراءة بيانات تذكرتي مباشرة من المتصفح. قد يكون السبب CORS أو تغيّر الـ API. استخدم زر فتح صفحة المباريات.",
                    BOOKING_URL
                );
            }
        }

        function startRadar() {
            const teamSelect = document.getElementById("teamName");
            const team = teamSelect.value.trim();

            selectedTeam = team;
            localStorage.setItem("ticketRadar.selectedTeam", selectedTeam);
            document.getElementById("selectedTeamText").textContent = selectedTeam || "-";

            if (!selectedTeam) {
                renderStatus(DEFAULT_STATUS);
                stopPolling();
                return;
            }

            renderStatus(`الرادار يعمل الآن على: ${escapeHtml(selectedTeam)}`, BOOKING_URL);
            startPolling();
            refreshStatus();
        }

        function stopRadar() {
            selectedTeam = "";
            localStorage.removeItem("ticketRadar.selectedTeam");
            lastPlayedStatus = "";
            document.getElementById("teamName").value = "";
            renderStatus("تم إيقاف الرادار", BOOKING_URL);
            document.getElementById("selectedTeamText").textContent = "-";
            stopPolling();
        }

        function startPolling() {
            stopPolling();
            radarTimerId = window.setInterval(refreshStatus, POLL_INTERVAL_MS);
        }

        function stopPolling() {
            if (radarTimerId !== null) {
                window.clearInterval(radarTimerId);
                radarTimerId = null;
            }
        }

        window.addEventListener("load", function () {
            document.getElementById("teamName").value = selectedTeam;
            document.getElementById("selectedTeamText").textContent = selectedTeam || "-";

            document.getElementById("startButton").addEventListener("click", startRadar);
            document.getElementById("stopButton").addEventListener("click", stopRadar);

            document.getElementById("soundToggleButton").addEventListener("click", function () {
                isSoundEnabled = !isSoundEnabled;
                localStorage.setItem("ticketRadar.soundEnabled", String(isSoundEnabled));
                updateSoundButton();
            });

            updateSoundButton();

            if (selectedTeam) {
                renderStatus(`الرادار يعمل الآن على: ${escapeHtml(selectedTeam)}`, BOOKING_URL);
                startPolling();
                refreshStatus();
                return;
            }

            renderStatus(DEFAULT_STATUS, BOOKING_URL);
        });
    </script>
</body>
</html>
